<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200">
  <defs>
    <linearGradient id="fade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="20%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="80%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .col { font-family: 'Courier New', monospace; font-size: 16px; font-weight: bold; }
      .head { fill: #FFFFFF; }
      .bright { fill: #00FF41; }
      .mid { fill: #00C430; }
      .dim { fill: #008520; }
      .faint { fill: #004510; }

      @keyframes fall1 { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
      @keyframes fall2 { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
      @keyframes fall3 { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
      @keyframes fall4 { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
      @keyframes fall5 { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }
      @keyframes fall6 { 0%{transform:translateY(-220px)} 100%{transform:translateY(220px)} }

      .c1  { animation: fall1 4s linear infinite; animation-delay: 0s; }
      .c2  { animation: fall2 5s linear infinite; animation-delay: -0.5s; }
      .c3  { animation: fall3 3.5s linear infinite; animation-delay: -1.2s; }
      .c4  { animation: fall4 4.8s linear infinite; animation-delay: -2s; }
      .c5  { animation: fall5 4.2s linear infinite; animation-delay: -0.8s; }
      .c6  { animation: fall6 5.5s linear infinite; animation-delay: -3s; }
      .c7  { animation: fall1 3.8s linear infinite; animation-delay: -1.5s; }
      .c8  { animation: fall2 5.2s linear infinite; animation-delay: -2.5s; }
      .c9  { animation: fall3 4.5s linear infinite; animation-delay: -0.3s; }
      .c10 { animation: fall4 3.6s linear infinite; animation-delay: -2.8s; }
      .c11 { animation: fall5 5s linear infinite; animation-delay: -1.8s; }
      .c12 { animation: fall6 4.4s linear infinite; animation-delay: -0.6s; }
      .c13 { animation: fall1 4.7s linear infinite; animation-delay: -3.2s; }
      .c14 { animation: fall2 3.9s linear infinite; animation-delay: -1.1s; }
      .c15 { animation: fall3 5.3s linear infinite; animation-delay: -2.2s; }
      .c16 { animation: fall4 4.1s linear infinite; animation-delay: -0.9s; }
      .c17 { animation: fall5 3.7s linear infinite; animation-delay: -2.6s; }
      .c18 { animation: fall6 4.6s linear infinite; animation-delay: -1.4s; }
      .c19 { animation: fall1 5.1s linear infinite; animation-delay: -3.5s; }
      .c20 { animation: fall2 4.3s linear infinite; animation-delay: -0.4s; }
      .c21 { animation: fall3 3.8s linear infinite; animation-delay: -2.1s; }
      .c22 { animation: fall4 5.4s linear infinite; animation-delay: -1.6s; }
      .c23 { animation: fall5 4s linear infinite; animation-delay: -3.1s; }
      .c24 { animation: fall6 3.6s linear infinite; animation-delay: -0.7s; }
    </style>
  </defs>

