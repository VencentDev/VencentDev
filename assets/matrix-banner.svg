    <g class="c2"><text x="70" y="0" class="head">3</text><text x="70" y="20" class="bright">F</text><text x="70" y="40" class="mid">p</text><text x="70" y="60" class="mid">1</text><text x="70" y="80" class="dim">w</text><text x="70" y="100" class="dim">5</text><text x="70" y="120" class="faint">n</text></g>
    <g class="c3"><text x="120" y="0" class="head">Z</text><text x="120" y="20" class="bright">9</text><text x="120" y="40" class="mid">b</text><text x="120" y="60" class="mid">4</text><text x="120" y="80" class="dim">e</text><text x="120" y="100" class="faint">8</text></g>
    <g class="c4"><text x="170" y="0" class="head">q</text><text x="170" y="20" class="bright">2</text><text x="170" y="40" class="mid">N</text><text x="170" y="60" class="mid">v</text><text x="170" y="80" class="dim">7</text><text x="170" y="100" class="dim">L</text><text x="170" y="120" class="faint">3</text></g>
    <g class="c5"><text x="220" y="0" class="head">8</text><text x="220" y="20" class="bright">r</text><text x="220" y="40" class="mid">5</text><text x="220" y="60" class="mid">T</text><text x="220" y="80" class="dim">a</text><text x="220" y="100" class="faint">0</text></g>
    <g class="c6"><text x="270" y="0" class="head">M</text><text x="270" y="20" class="bright">6</text><text x="270" y="40" class="mid">d</text><text x="270" y="60" class="mid">3</text><text x="270" y="80" class="dim">Y</text><text x="270" y="100" class="dim">k</text><text x="270" y="120" class="faint">1</text></g>
    <g class="c7"><text x="320" y="0" class="head">x</text><text x="320" y="20" class="bright">4</text><text x="320" y="40" class="mid">P</text><text x="320" y="60" class="mid">9</text><text x="320" y="80" class="dim">h</text><text x="320" y="100" class="faint">2</text></g>
    <g class="c8"><text x="370" y="0" class="head">7</text><text x="370" y="20" class="bright">B</text><text x="370" y="40" class="mid">j</text><text x="370" y="60" class="mid">0</text><text x="370" y="80" class="dim">u</text><text x="370" y="100" class="dim">5</text><text x="370" y="120" class="faint">c</text></g>
    <g class="c9"><text x="420" y="0" class="head">G</text><text x="420" y="20" class="bright">1</text><text x="420" y="40" class="mid">f</text><text x="420" y="60" class="mid">8</text><text x="420" y="80" class="dim">W</text><text x="420" y="100" class="faint">3</text></g>
    <g class="c10"><text x="470" y="0" class="head">5</text><text x="470" y="20" class="bright">o</text><text x="470" y="40" class="mid">2</text><text x="470" y="60" class="mid">R</text><text x="470" y="80" class="dim">y</text><text x="470" y="100" class="dim">6</text><text x="470" y="120" class="faint">i</text></g>
    <g class="c11"><text x="520" y="0" class="head">D</text><text x="520" y="20" class="bright">9</text><text x="520" y="40" class="mid">s</text><text x="520" y="60" class="mid">4</text><text x="520" y="80" class="dim">V</text><text x="520" y="100" class="faint">7</text></g>
    <g class="c12"><text x="570" y="0" class="head">l</text><text x="570" y="20" class="bright">3</text><text x="570" y="40" class="mid">H</text><text x="570" y="60" class="mid">z</text><text x="570" y="80" class="dim">8</text><text x="570" y="100" class="dim">Q</text><text x="570" y="120" class="faint">4</text></g>
    <g class="c13"><text x="620" y="0" class="head">2</text><text x="620" y="20" class="bright">t</text><text x="620" y="40" class="mid">6</text><text x="620" y="60" class="mid">K</text><text x="620" y="80" class="dim">g</text><text x="620" y="100" class="faint">1</text></g>
    <g class="c14"><text x="670" y="0" class="head">U</text><text x="670" y="20" class="bright">5</text><text x="670" y="40" class="mid">e</text><text x="670" y="60" class="mid">0</text><text x="670" y="80" class="dim">X</text><text x="670" y="100" class="dim">n</text><text x="670" y="120" class="faint">9</text></g>
    <g class="c15"><text x="720" y="0" class="head">w</text><text x="720" y="20" class="bright">8</text><text x="720" y="40" class="mid">A</text><text x="720" y="60" class="mid">3</text><text x="720" y="80" class="dim">m</text><text x="720" y="100" class="faint">6</text></g>
    <g class="c16"><text x="770" y="0" class="head">7</text><text x="770" y="20" class="bright">C</text><text x="770" y="40" class="mid">p</text><text x="770" y="60" class="mid">1</text><text x="770" y="80" class="dim">S</text><text x="770" y="100" class="dim">4</text><text x="770" y="120" class="faint">b</text></g>
    <g class="c17"><text x="820" y="0" class="head">J</text><text x="820" y="20" class="bright">2</text><text x="820" y="40" class="mid">v</text><text x="820" y="60" class="mid">9</text><text x="820" y="80" class="dim">r</text><text x="820" y="100" class="faint">5</text></g>
    <g class="c18"><text x="870" y="0" class="head">6</text><text x="870" y="20" class="bright">E</text><text x="870" y="40" class="mid">x</text><text x="870" y="60" class="mid">3</text><text x="870" y="80" class="dim">k</text><text x="870" y="100" class="dim">8</text><text x="870" y="120" class="faint">d</text></g>
    <g class="c19"><text x="920" y="0" class="head">O</text><text x="920" y="20" class="bright">4</text><text x="920" y="40" class="mid">y</text><text x="920" y="60" class="mid">7</text><text x="920" y="80" class="dim">I</text><text x="920" y="100" class="faint">2</text></g>
    <g class="c20"><text x="970" y="0" class="head">9</text><text x="970" y="20" class="bright">f</text><text x="970" y="40" class="mid">5</text><text x="970" y="60" class="mid">L</text><text x="970" y="80" class="dim">h</text><text x="970" y="100" class="dim">0</text><text x="970" y="120" class="faint">c</text></g>
    <g class="c21"><text x="1020" y="0" class="head">a</text><text x="1020" y="20" class="bright">1</text><text x="1020" y="40" class="mid">N</text><text x="1020" y="60" class="mid">8</text><text x="1020" y="80" class="dim">u</text><text x="1020" y="100" class="faint">3</text></g>
    <g class="c22"><text x="1070" y="0" class="head">5</text><text x="1070" y="20" class="bright">T</text><text x="1070" y="40" class="mid">o</text><text x="1070" y="60" class="mid">2</text><text x="1070" y="80" class="dim">P</text><text x="1070" y="100" class="dim">7</text><text x="1070" y="120" class="faint">m</text></g>
    <g class="c23"><text x="1120" y="0" class="head">i</text><text x="1120" y="20" class="bright">6</text><text x="1120" y="40" class="mid">B</text><text x="1120" y="60" class="mid">0</text><text x="1120" y="80" class="dim">e</text><text x="1120" y="100" class="faint">4</text></g>
    <g class="c24"><text x="1170" y="0" class="head">3</text><text x="1170" y="20" class="bright">R</text><text x="1170" y="40" class="mid">q</text><text x="1170" y="60" class="mid">9</text><text x="1170" y="80" class="dim">F</text><text x="1170" y="100" class="dim">1</text><text x="1170" y="120" class="faint">x</text></g>
  </g>

  <!-- Top/bottom fade overlay -->
  <rect width="1200" height="200" fill="url(#fade)"/>

  <!-- Center title overlay -->
  <g filter="url(#glow)">
    <text x="600" y="105" font-family="'Courier New', monospace" font-size="56" font-weight="bold" fill="#00FF41" text-anchor="middle" letter-spacing="8">ICE BELL</text>
    <text x="600" y="135" font-family="'Courier New', monospace" font-size="14" fill="#00C430" text-anchor="middle" letter-spacing="4">[ ROOT @ NASTYBOX ~ ]</text>
  </g>
